<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Ücretsiz Oyunlar</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #1e2a3a;
            --accent: #e94560;
            --text: #eee;
            --soft: #16213e;
            --border: #333;
            --green: #2ecc71;
            --orange: #f39c12;
            --radius: 8px;
        }
        .theme-pink {
            --bg: #2d1b2e;
            --card: #3a253d;
            --accent: #ff7eb3;
            --text: #ffe6f0;
            --soft: #4a2d4d;
            --green: #ff9ecb;
            --orange: #ffb347;
        }
        .theme-hacker {
            --bg: #0a0a0a;
            --card: #111;
            --accent: #00ff41;
            --text: #b3ffb3;
            --soft: #1a1a1a;
            --green: #00cc33;
            --orange: #ffcc00;
        }
        /* FELAKET ADMIN TEMASI */
        body.admin-mode {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --accent: #ffd700;
            --text: #f0e6b2;
            --soft: #262626;
            --border: #ffd700;
            --green: #ffcc00;
            --orange: #ffaa00;
            background: #0a0a0a;
            background-image: 
                linear-gradient(45deg, rgba(255,215,0,0.05) 0%, transparent 50%),
                linear-gradient(135deg, transparent 50%, rgba(255,140,0,0.07) 100%);
            background-attachment: fixed;
            animation: adminBgShift 8s ease-in-out infinite alternate;
        }
        @keyframes adminBgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
        body.admin-mode .navbar {
            background: #111;
            border-bottom: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        body.admin-mode .logo {
            color: #ffd700;
            text-shadow: 0 0 15px #ffaa00;
        }
        body.admin-mode .nav-links button {
            background: #1a1a1a;
            border-color: #ffd700;
            color: #ffd700;
        }
        body.admin-mode .nav-links button:hover {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 20px #ffd700;
        }
        body.admin-mode .online-counter {
            background: #1a1a1a;
            border-color: #ffd700;
            color: #ffd700;
        }
        body.admin-mode .dot {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700;
        }
        body.admin-mode .admin-panel {
            background: rgba(20,20,20,0.95);
            border: 3px solid #ffd700;
            box-shadow: 0 0 40px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05);
            animation: panelGlow 2s ease-in-out infinite alternate;
        }
        @keyframes panelGlow {
            0% { box-shadow: 0 0 40px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05); }
            100% { box-shadow: 0 0 70px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.1); }
        }
        body.admin-mode .admin-menu button {
            background: #111;
            border-color: #ffd700;
            color: #ffd700;
        }
        body.admin-mode .admin-menu button.active {
            background: #ffd700 !important;
            color: #000 !important;
            box-shadow: 0 0 25px #ffaa00;
        }
        body.admin-mode .admin-form input,
        body.admin-mode .admin-form textarea,
        body.admin-mode .admin-form select {
            background: #111;
            border-color: #ffd700;
            color: #ffd700;
        }
        body.admin-mode .btn-save {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 15px #ffaa00;
        }
        body.admin-mode .btn-delete {
            background: #ff4444;
            color: #fff;
        }
        body.admin-mode .btn-edit {
            background: #ffaa00;
            color: #000;
        }
        body.admin-mode .admin-game-list-item {
            border-bottom-color: #ffd700;
        }
        body.admin-mode .toast {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 30px #ffaa00;
        }
        body.admin-mode .modal {
            background: #111;
            border-color: #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.4);
        }
        body.admin-mode .download-btn {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 20px #ffaa00;
        }
        /* Diğer stiller aynen korunuyor */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        .navbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); cursor: pointer; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links button {
            background: var(--soft);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.15s;
        }
        .nav-links button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-primary { background: var(--accent) !important; color: #000 !important; }
        .online-counter {
            background: var(--soft);
            border: 1px solid var(--border);
            color: var(--green);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
        .theme-dot {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; display: inline-block; margin: 0 2px;
        }
        .theme-dot:hover { border-color: #fff; }
        .theme-dot.pink { background: #ff7eb3; }
        .theme-dot.hacker { background: #00ff41; }
        .theme-dot.default { background: #e94560; }
        .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
        .section-title { font-size: 1.4rem; font-weight: 700; margin: 16px 0 10px; }
        .search-bar {
            width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--soft); color: var(--text);
            font-size: 0.9rem; outline: none; margin-bottom: 10px;
        }
        .search-bar:focus { border-color: var(--accent); }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }
        .game-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: 0.15s;
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .img-wrap {
            height: 110px; background: var(--soft); display: flex;
            align-items: center; justify-content: center; font-size: 2.5rem;
            border-bottom: 1px solid var(--border);
        }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; }
        .info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
        .category-tag {
            display: inline-block; background: var(--soft); color: var(--accent);
            padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600;
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; max-width: 480px; width: 92%; max-height: 82vh; overflow-y: auto;
        }
        .close-btn { float: right; background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; opacity: 0.7; }
        .close-btn:hover { opacity: 1; }
        .download-btn {
            background: var(--accent); color: #000; padding: 10px 20px; border-radius: 6px;
            text-decoration: none; font-weight: 700; display: inline-block; margin-top: 8px;
            border: none; cursor: pointer; font-size: 0.9rem;
        }
        .feature-box {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; margin: 14px 0;
        }
        .feature-box h3 { margin-bottom: 8px; font-size: 1.1rem; }
        .feature-box select, .feature-box input {
            width: 100%; padding: 8px; margin: 4px 0;
            background: var(--soft); border: 1px solid var(--border);
            color: var(--text); border-radius: 4px; font-size: 0.85rem;
        }
        .comment {
            background: var(--soft); padding: 8px 12px; border-radius: 6px;
            margin: 6px 0; font-size: 0.85rem;
        }
        .admin-panel {
            background: var(--card); border: 2px solid var(--orange);
            border-radius: var(--radius); padding: 20px; margin-top: 14px;
        }
        .admin-panel h3 { color: var(--orange); font-size: 1.3rem; margin-bottom: 12px; }
        .admin-menu {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .admin-menu button {
            padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
            font-weight: 700; font-size: 0.85rem; background: var(--soft);
            color: var(--text); border: 1px solid var(--border);
        }
        .admin-menu button:hover { background: var(--accent); color: #000; }
        .admin-menu .active { background: var(--orange) !important; color: #000 !important; border-color: var(--orange) !important; }
        .btn-save {
            background: var(--green); color: #000; padding: 8px 18px; border-radius: 6px;
            border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem;
        }
        .btn-delete { background: #e94560; color: #fff; padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-edit { background: var(--orange); color: #000; padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%; padding: 8px; margin: 4px 0 8px;
            background: var(--soft); border: 1px solid var(--border);
            color: var(--text); border-radius: 4px; font-size: 0.85rem;
        }
        .admin-game-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid var(--border); gap: 6px;
            flex-wrap: wrap; font-size: 0.85rem;
        }
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--green);
            color: #000; padding: 10px 20px; border-radius: 6px; font-weight: 700;
            z-index: 999; font-size: 0.85rem;
        }
        .hidden { display: none !important; }
        @media (max-width: 600px) {
            .game-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .nav-links button { padding: 5px 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="location.reload()">🎮 GameHub</div>
    <div class="nav-links">
        <span style="font-size:0.7rem;">Tema:</span>
        <div class="theme-dot pink" onclick="setTheme('pink')" title="Pembe"></div>
        <div class="theme-dot hacker" onclick="setTheme('hacker')" title="Hacker"></div>
        <div class="theme-dot default" onclick="setTheme('default')" title="Normal"></div>
        <div class="online-counter"><span class="dot"></span> <span id="onlineText">1 çevrimiçi</span></div>
        <button onclick="openModal('loginModal')">🔑 Giriş</button>
        <button onclick="openModal('registerModal')">✨ Kayıt</button>
        <button class="btn-primary" onclick="anonymousLogin()">👻 Anonim</button>
        <span id="userBadge" class="hidden" style="background:var(--soft);padding:6px 12px;border-radius:6px;font-size:0.8rem;"></span>
        <button id="btnLogout" class="hidden" onclick="logout()">🚪 Çık</button>
    </div>
</nav>

<div class="container" id="mainContent">
    <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Oyun ara...">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
        <button onclick="showSection('games')" style="background:var(--accent);color:#000;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.8rem;">🎮 Oyunlar</button>
        <button onclick="showSection('compare')" style="background:var(--soft);color:var(--text);padding:7px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-weight:600;font-size:0.8rem;">⚖️ Karşılaştır</button>
        <button onclick="showSection('pctest')" style="background:var(--soft);color:var(--text);padding:7px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-weight:600;font-size:0.8rem;">🖥️ PC Test</button>
        <button onclick="showSection('comments')" style="background:var(--soft);color:var(--text);padding:7px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-weight:600;font-size:0.8rem;">💬 Yorumlar</button>
    </div>
    <div id="gamesSection"><div class="section-title">🔥 Popüler Oyunlar</div><div class="game-grid" id="gameGrid"></div></div>
    <div id="compareSection" class="feature-box hidden">
        <h3>⚖️ Oyun Karşılaştır</h3>
        <select id="compareGame1"><option value="">Oyun 1 seç</option></select>
        <select id="compareGame2"><option value="">Oyun 2 seç</option></select>
        <button onclick="compareGames()" style="background:var(--accent);color:#000;padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;margin-top:6px;">Karşılaştır</button>
        <div id="compareResult" style="margin-top:10px;font-size:0.85rem;"></div>
    </div>
    <div id="pctestSection" class="feature-box hidden">
        <h3>🖥️ Sistem Gereksinim Testi</h3>
        <p style="font-size:0.8rem;opacity:0.7;">Bilgisayar özelliklerini gir, oyunun çalışıp çalışmayacağını gör.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <input type="text" id="cpuInput" placeholder="İşlemci (i5-12400F)">
            <input type="text" id="ramInput" placeholder="RAM (GB)">
            <input type="text" id="gpuInput" placeholder="Ekran kartı (RTX 3060)">
            <input type="text" id="osInput" placeholder="İşletim sistemi">
        </div>
        <select id="testGameSelect" style="margin-top:6px;"><option value="">Test edilecek oyunu seç</option></select>
        <button onclick="runPcTest()" style="background:var(--green);color:#000;padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;margin-top:6px;">Test Et</button>
        <div id="pcTestResult" style="margin-top:10px;font-size:0.85rem;"></div>
    </div>
    <div id="commentsSection" class="feature-box hidden">
        <h3>💬 Genel Yorumlar</h3>
        <div id="globalComments" style="font-size:0.85rem;"></div>
        <div style="display:flex;gap:6px;margin-top:8px;">
            <input type="text" id="globalCommentInput" placeholder="Yorumunuzu yazın..." style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--soft);color:var(--text);font-size:0.85rem;">
            <button onclick="addGlobalComment()" style="background:var(--accent);color:#000;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;">Gönder</button>
        </div>
    </div>
</div>

<div class="container hidden" id="adminContainer">
    <div class="admin-panel">
        <h3>🛡️ Admin Paneli</h3>
        <div class="admin-menu">
            <button id="menuAdd" class="active" onclick="showAdminSection('add')">➕ Oyun Ekle</button>
            <button id="menuList" onclick="showAdminSection('list')">📋 Liste</button>
            <button id="menuEdit" onclick="showAdminSection('edit')">✏️ Düzenle</button>
            <button onclick="closeAdmin()" style="background:#555;color:#fff;">❌ Kapat</button>
        </div>
        <div id="sectionAdd" class="admin-form">
            <h4>Yeni Oyun Ekle</h4>
            <input type="text" id="addTitle" placeholder="Oyun Adı *">
            <textarea id="addDesc" placeholder="Açıklama *" rows="2"></textarea>
            <input type="text" id="addImage" placeholder="Resim URL (opsiyonel)">
            <input type="text" id="addDownload" placeholder="İndirme Linki *">
            <input type="text" id="addCategory" placeholder="Kategori *">
            <input type="text" id="addSize" placeholder="Boyut (örn: 25 GB)">
            <input type="text" id="addCpu" placeholder="Minimum İşlemci">
            <input type="text" id="addRam" placeholder="Minimum RAM (GB)">
            <input type="text" id="addGpu" placeholder="Minimum Ekran Kartı">
            <button class="btn-save" onclick="addGame()">💾 Ekle</button>
        </div>
        <div id="sectionList" class="hidden"><h4>Tüm Oyunlar</h4><div id="adminGameList"></div></div>
        <div id="sectionEdit" class="admin-form hidden">
            <h4>Oyun Düzenle</h4>
            <select id="editSelect" onchange="loadGameForEdit()"><option value="">Düzenlenecek oyunu seç</option></select>
            <input type="hidden" id="editGameId">
            <input type="text" id="editTitle" placeholder="Oyun Adı">
            <textarea id="editDesc" placeholder="Açıklama" rows="2"></textarea>
            <input type="text" id="editImage" placeholder="Resim URL">
            <input type="text" id="editDownload" placeholder="İndirme Linki">
            <input type="text" id="editCategory" placeholder="Kategori">
            <input type="text" id="editSize" placeholder="Boyut">
            <input type="text" id="editCpu" placeholder="Minimum İşlemci">
            <input type="text" id="editRam" placeholder="Minimum RAM">
            <input type="text" id="editGpu" placeholder="Minimum Ekran Kartı">
            <button class="btn-save" onclick="updateGame()">💾 Güncelle</button>
        </div>
    </div>
</div>

<div class="modal-overlay hidden" id="gameDetailModal"><div class="modal" id="gameDetailContent"></div></div>
<div class="modal-overlay hidden" id="loginModal">
    <div class="modal"><button class="close-btn" onclick="closeModal('loginModal')">✕</button><h3>🔑 Giriş</h3>
        <input id="loginUsername" placeholder="Kullanıcı adı" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <input type="password" id="loginPassword" placeholder="Şifre" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <button class="download-btn" onclick="login()" style="width:100%;">Giriş Yap</button></div></div>
<div class="modal-overlay hidden" id="registerModal">
    <div class="modal"><button class="close-btn" onclick="closeModal('registerModal')">✕</button><h3>✨ Kayıt</h3>
        <input id="regUsername" placeholder="Kullanıcı adı" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <input type="email" id="regEmail" placeholder="E-posta (opsiyonel)" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <input type="password" id="regPassword" placeholder="Şifre" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <button class="download-btn" onclick="register()" style="width:100%;">Kayıt Ol</button></div></div>
<div class="modal-overlay hidden" id="adminLoginModal">
    <div class="modal"><button class="close-btn" onclick="closeModal('adminLoginModal')">✕</button><h3>🛡️ Admin Girişi</h3>
        <input type="password" id="adminKey" placeholder="Admin şifresi" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <button class="download-btn" onclick="adminLogin()" style="width:100%;">Giriş</button></div></div>
<div class="toast hidden" id="toast"></div>
<div style="position:fixed;bottom:14px;right:14px;width:30px;height:30px;background:var(--card);border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:300;color:var(--accent);font-size:0.8rem;font-weight:bold;" onclick="openModal('adminLoginModal')" title="Admin">⚙</div>

    function S(k,d){ let v=localStorage.getItem(k); return v ? JSON.parse(v) : d; }
    function G(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
    function getGames(){ return S('gh_games', defaultGames); }
    function saveGames(g){ G('gh_games', g); }
    function getUsers(){ return S('gh_users', []); }
    function saveUsers(u){ G('gh_users', u); }
    function getComments(){ return S('gh_comments', []); }
    function saveComments(c){ G('gh_comments', c); }
    function getCurrentUser(){ return S('gh_user', null); }
    function setCurrentUser(u){ G('gh_user', u); }
    function isAdmin(){ return localStorage.getItem('gh_admin') === 'true'; }
    function setAdmin(v){ localStorage.setItem('gh_admin', v); }

    // Tema ayarlama
    window.setTheme = function(t){
        document.body.className = '';
        if(isAdmin()) document.body.classList.add('admin-mode'); // admin teması korunur
        else {
            if(t==='pink') document.body.classList.add('theme-pink');
            else if(t==='hacker') document.body.classList.add('theme-hacker');
        }
        G('gh_theme', t);
    };
    // Admin modunu güncelle
    function applyAdminMode() {
        if(isAdmin()) document.body.classList.add('admin-mode');
        else document.body.classList.remove('admin-mode');
    }

    setTheme(S('gh_theme','default'));

    setInterval(()=>{
        let s = S('gh_sessions',{});
        let n = Date.now();
        for(let k in s){ if(n - s[k] > 15000) delete s[k]; }
        s['self'] = n;
        G('gh_sessions', s);
        document.getElementById('onlineText').textContent = Object.keys(s).length + ' çevrimiçi';
    }, 5000);

    window.showToast = function(m){
        let t = document.getElementById('toast');
        t.textContent = m; t.classList.remove('hidden');
        setTimeout(()=> t.classList.add('hidden'), 2000);
    };
    window.openModal = function(id){ document.getElementById(id).classList.remove('hidden'); };
    window.closeModal = function(id){ document.getElementById(id).classList.add('hidden'); };
    document.addEventListener('click', function(e){ if(e.target.classList.contains('modal-overlay')) e.target.classList.add('hidden'); });

    function renderGames(filter=''){
        let g = getGames().filter(x=> x.title.toLowerCase().includes(filter.toLowerCase()) || x.category.toLowerCase().includes(filter.toLowerCase()));
        document.getElementById('gameGrid').innerHTML = g.map(x=> `
            <div class="game-card" onclick="openGameDetail('${x.id}')">
                <div class="img-wrap">${x.image ? `<img src="${x.image}" onerror="this.innerHTML='🎮'">` : '🎮'}</div>
                <div class="info"><h3>${x.title}</h3><span class="category-tag">${x.category}</span></div>
            </div>
        `).join('') || '<p style="grid-column:1/-1;text-align:center;">😔 Oyun bulunamadı</p>';
        updateSelects();
    }
    document.getElementById('searchInput').addEventListener('input', ()=> renderGames(document.getElementById('searchInput').value));

    function updateSelects(){
        let g = getGames();
        let o = g.map(x=> `<option value="${x.id}">${x.title}</option>`).join('');
        document.getElementById('compareGame1').innerHTML = '<option value="">Oyun 1 seç</option>'+o;
        document.getElementById('compareGame2').innerHTML = '<option value="">Oyun 2 seç</option>'+o;
        document.getElementById('testGameSelect').innerHTML = '<option value="">Oyun seç</option>'+o;
        document.getElementById('editSelect').innerHTML = '<option value="">Oyun seç</option>'+o;
        renderComments();
    }

    window.openGameDetail = function(id){
        let g = getGames().find(x=> x.id === id);
        if(!g) return;
        document.getElementById('gameDetailContent').innerHTML = `
            <button class="close-btn" onclick="closeModal('gameDetailModal')">✕</button>
            <div style="height:120px;background:var(--soft);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;">${g.image ? `<img src="${g.image}" style="width:100%;height:100%;object-fit:cover;">` : '🎮'}</div>
            <h3>${g.title}</h3><p style="font-size:0.8rem;opacity:0.8;">📦 ${g.size} | 🏷️ ${g.category}</p>
            <p style="margin:6px 0;">${g.desc}</p>
            <p style="font-size:0.75rem;opacity:0.7;">🖥️ Min: ${g.minCpu||'?'} | ${g.minRam||'?'} GB RAM | ${g.minGpu||'?'}</p>
            <a href="${g.download}" class="download-btn" target="_blank">⬇️ İndir</a>`;
        openModal('gameDetailModal');
    };

    window.compareGames = function(){
        let a = getGames().find(x=> x.id === document.getElementById('compareGame1').value);
        let b = getGames().find(x=> x.id === document.getElementById('compareGame2').value);
        if(!a || !b) return showToast('Lütfen iki oyun seçin!');
        document.getElementById('compareResult').innerHTML = `
            <table style="width:100%;border-collapse:collapse;font-size:0.85rem;">
                <tr style="border-bottom:1px solid var(--border);"><th>Özellik</th><th>${a.title}</th><th>${b.title}</th></tr>
                <tr><td>Kategori</td><td>${a.category}</td><td>${b.category}</td></tr>
                <tr><td>Boyut</td><td>${a.size}</td><td>${b.size}</td></tr>
                <tr><td>Min İşlemci</td><td>${a.minCpu||'?'}</td><td>${b.minCpu||'?'}</td></tr>
                <tr><td>Min RAM</td><td>${a.minRam||'?'} GB</td><td>${b.minRam||'?'} GB</td></tr>
                <tr><td>Min GPU</td><td>${a.minGpu||'?'}</td><td>${b.minGpu||'?'}</td></tr>
            </table>`;
    };

    window.runPcTest = function(){
        let g = getGames().find(x=> x.id === document.getElementById('testGameSelect').value);
        if(!g) return showToast('Lütfen bir oyun seçin!');
        let cpu = document.getElementById('cpuInput').value.trim().toLowerCase();
        let ram = parseInt(document.getElementById('ramInput').value.trim());
        let gpu = document.getElementById('gpuInput').value.trim().toLowerCase();
        let cpuOk = cpu.includes(g.minCpu?.toLowerCase()||'') || !g.minCpu;
        let ramOk = ram >= parseInt(g.minRam||0);
        let gpuOk = gpu.includes(g.minGpu?.toLowerCase()||'') || !g.minGpu;
        let ok = cpuOk && ramOk && gpuOk;
        document.getElementById('pcTestResult').innerHTML = `
            <p><b>${g.title}</b> için sonuç:</p>
            <p style="font-size:1.1rem;font-weight:700;color:${ok?'var(--green)':'#e94560'};">${ok ? '✅ AÇILIR' : '❌ AÇILMAZ'}</p>
            <p style="font-size:0.8rem;">CPU: ${cpuOk?'✅':'❌'} | RAM: ${ramOk?'✅':'❌'} | GPU: ${gpuOk?'✅':'❌'}</p>`;
    };

    function renderComments(){
        document.getElementById('globalComments').innerHTML = getComments().slice(-10).reverse().map(c=> `
            <div class="comment"><b style="color:var(--accent);">${c.author}</b> <small style="opacity:0.6;">${c.date}</small><p>${c.text}</p></div>
        `).join('') || '<p style="opacity:0.6;">Henüz yorum yok.</p>';
    }

    window.addGlobalComment = function(){
        let u = getCurrentUser();
        if(!u) return showToast('Yorum yapmak için giriş yapın!');
        let t = document.getElementById('globalCommentInput').value.trim();
        if(!t) return showToast('Yorum boş olamaz!');
        let c = getComments();
        c.push({ author: u.username, text: t, date: new Date().toLocaleString('tr-TR') });
        saveComments(c);
        document.getElementById('globalCommentInput').value = '';
        renderComments();
        showToast('✅ Yorum eklendi!');
    };

    window.showSection = function(section){
        document.getElementById('gamesSection').classList.add('hidden');
        document.getElementById('compareSection').classList.add('hidden');
        document.getElementById('pctestSection').classList.add('hidden');
        document.getElementById('commentsSection').classList.add('hidden');
        if(section === 'games') document.getElementById('gamesSection').classList.remove('hidden');
        else if(section === 'compare') document.getElementById('compareSection').classList.remove('hidden');
        else if(section === 'pctest') document.getElementById('pctestSection').classList.remove('hidden');
        else if(section === 'comments') document.getElementById('commentsSection').classList.remove('hidden');
    };

    window.login = function(){
        let u = document.getElementById('loginUsername').value.trim();
        let p = document.getElementById('loginPassword').value.trim();
        if(!u||!p) return showToast('Boş bırakmayın!');
        let user = getUsers().find(x=> x.username===u && x.password===p);
        if(!user) return showToast('Hatalı!');
        setCurrentUser({ username: user.username });
        closeModal('loginModal');
        updateUI();
    };
    window.register = function(){
        let u = document.getElementById('regUsername').value.trim();
        let p = document.getElementById('regPassword').value.trim();
        if(!u||!p) return showToast('Kullanıcı adı ve şifre zorunlu!');
        if(getUsers().find(x=> x.username===u)) return showToast('Alınmış!');
        getUsers().push({ username: u, email: document.getElementById('regEmail').value.trim(), password: p });
        saveUsers(getUsers());
        setCurrentUser({ username: u });
        closeModal('registerModal');
        updateUI();
    };
    window.anonymousLogin = function(){ setCurrentUser({ username: 'Anon_'+Math.random().toString(36).substr(2,5) }); updateUI(); };
    window.logout = function(){ setCurrentUser(null); setAdmin('false'); updateUI(); };
    window.adminLogin = function(){
        if(document.getElementById('adminKey').value.trim() === ADMIN_PASSWORD){
            setAdmin('true');
            if(!getCurrentUser()) setCurrentUser({ username: 'Admin' });
            closeModal('adminLoginModal');
            updateUI();
            showToast('🛡️ Admin paneline hoş geldin!');
        } else showToast('❌ Hatalı şifre!');
    };
    window.closeAdmin = function(){ setAdmin('false'); updateUI(); };

    window.showAdminSection = function(s){
        document.getElementById('sectionAdd').classList.add('hidden');
        document.getElementById('sectionList').classList.add('hidden');
        document.getElementById('sectionEdit').classList.add('hidden');
        document.getElementById('menuAdd').classList.remove('active');
        document.getElementById('menuList').classList.remove('active');
        document.getElementById('menuEdit').classList.remove('active');
        if(s==='add'){ document.getElementById('sectionAdd').classList.remove('hidden'); document.getElementById('menuAdd').classList.add('active'); }
        else if(s==='list'){ document.getElementById('sectionList').classList.remove('hidden'); document.getElementById('menuList').classList.add('active'); renderAdminList(); }
        else { document.getElementById('sectionEdit').classList.remove('hidden'); document.getElementById('menuEdit').classList.add('active'); updateSelects(); }
    };

    function renderAdminList(){
        document.getElementById('adminGameList').innerHTML = getGames().map(g=> `
            <div class="admin-game-list-item"><span><b>${g.title}</b> (${g.category}) - ${g.size}</span><div><button class="btn-edit" onclick="editDirect('${g.id}')">✏️</button> <button class="btn-delete" onclick="delGame('${g.id}')">🗑️</button></div></div>
        `).join('');
    }
    window.editDirect = function(id){ showAdminSection('edit'); document.getElementById('editSelect').value = id; loadGameForEdit(); };
    window.loadGameForEdit = function(){
        let g = getGames().find(x=> x.id === document.getElementById('editSelect').value);
        if(!g) return;
        ['editGameId','editTitle','editDesc','editImage','editDownload','editCategory','editSize','editCpu','editRam','editGpu'].forEach((k,i)=> document.getElementById(k).value = [g.id, g.title, g.desc, g.image||'', g.download, g.category, g.size, g.minCpu||'', g.minRam||'', g.minGpu||''][i]);
    };
    window.addGame = function(){
        let f = ['addTitle','addDesc','addDownload','addCategory'].map(id=> document.getElementById(id).value.trim());
        if(f.some(x=>!x)) return showToast('Zorunlu alanları doldurun!');
        getGames().push({ id: Date.now().toString(), title: f[0], desc: f[1], image: document.getElementById('addImage').value.trim(), download: f[2], category: f[3], size: document.getElementById('addSize').value.trim()||'?', minCpu: document.getElementById('addCpu').value.trim(), minRam: document.getElementById('addRam').value.trim(), minGpu: document.getElementById('addGpu').value.trim() });
        saveGames(getGames());
        ['addTitle','addDesc','addImage','addDownload','addCategory','addSize','addCpu','addRam','addGpu'].forEach(id=> document.getElementById(id).value = '');
        showToast('✅ Oyun eklendi!');
        renderGames();
    };
    window.updateGame = function(){
        let id = document.getElementById('editGameId').value;
        if(!id) return showToast('Önce bir oyun seçin!');
        let g = getGames();
        let i = g.findIndex(x=> x.id === id);
        if(i===-1) return;
        g[i] = { ...g[i], title: document.getElementById('editTitle').value.trim(), desc: document.getElementById('editDesc').value.trim(), image: document.getElementById('editImage').value.trim(), download: document.getElementById('editDownload').value.trim(), category: document.getElementById('editCategory').value.trim(), size: document.getElementById('editSize').value.trim(), minCpu: document.getElementById('editCpu').value.trim(), minRam: document.getElementById('editRam').value.trim(), minGpu: document.getElementById('editGpu').value.trim() };
        saveGames(g);
        showToast('✅ Oyun güncellendi!');
        renderGames();
        showAdminSection('list');
    };
    window.delGame = function(id){
        if(!confirm('Silmek istediğinize emin misiniz?')) return;
        saveGames(getGames().filter(x=> x.id !== id));
        showToast('🗑️ Oyun silindi!');
        renderGames();
        renderAdminList();
    };

    function updateUI(){
        let u = getCurrentUser();
        let a = isAdmin();
        let b = document.getElementById('userBadge');
        if(u){ b.classList.remove('hidden'); b.textContent = '👤 '+u.username; } else b.classList.add('hidden');
        document.getElementById('btnLogout').classList.toggle('hidden', !u);
        document.querySelectorAll('.nav-links button:not(#btnLogout)').forEach(x=> x.classList.toggle('hidden', !!u));
        document.querySelector('.online-counter').classList.remove('hidden');
        document.getElementById('mainContent').classList.toggle('hidden', a);
        document.getElementById('adminContainer').classList.toggle('hidden', !a);
        applyAdminMode(); // admin teması uygula/kaldır
        if(a) showAdminSection('add');
        renderGames(document.getElementById('searchInput').value);
    }

    document.addEventListener('keydown', function(e){
        if(e.ctrlKey && e.shiftKey && e.key === 'A'){
            e.preventDefault();
            isAdmin() ? closeAdmin() : openModal('adminLoginModal');
        }
    });

    updateUI();
    renderGames();
</script>
</body>
</html>
