<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Ücretsiz Oyunlar</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #1e2a3a;
            --accent: #e94560;
            --text: #eee;
            --soft: #16213e;
            --border: #333;
            --green: #2ecc71;
            --orange: #f39c12;
            --radius: 8px;
        }
        .theme-pink {
            --bg: #2d1b2e;
            --card: #3a253d;
            --accent: #ff7eb3;
            --text: #ffe6f0;
            --soft: #4a2d4d;
            --green: #ff9ecb;
            --orange: #ffb347;
        }
        .theme-hacker {
            --bg: #0a0a0a;
            --card: #111;
            --accent: #00ff41;
            --text: #b3ffb3;
            --soft: #1a1a1a;
            --green: #00cc33;
            --orange: #ffcc00;
        }
        .theme-admin-gold {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --accent: #ffd700;
            --text: #f0e6b2;
            --soft: #262626;
            --border: #ffd700;
            --green: #ffcc00;
            --orange: #ffaa00;
            background: #0a0a0a;
            background-image: linear-gradient(45deg, rgba(255,215,0,0.05) 0%, transparent 50%), linear-gradient(135deg, transparent 50%, rgba(255,140,0,0.07) 100%);
            background-attachment: fixed;
            animation: adminBgShift 8s ease-in-out infinite alternate;
        }
        .theme-admin-purple {
            --bg: #0f0a14;
            --card: #1a1126;
            --accent: #c77dff;
            --text: #e5d9f2;
            --soft: #261a33;
            --border: #9b5de5;
            --green: #b388eb;
            --orange: #f15bb5;
            background: #0b0710;
            background-image: linear-gradient(45deg, rgba(199,125,255,0.08) 0%, transparent 50%), linear-gradient(135deg, transparent 50%, rgba(154,93,229,0.08) 100%);
            background-attachment: fixed;
            animation: adminBgShift 10s ease-in-out infinite alternate;
        }
        .theme-admin-orange {
            --bg: #1a0f07;
            --card: #24180c;
            --accent: #ff6d00;
            --text: #ffe0c0;
            --soft: #2e1f10;
            --border: #ff8500;
            --green: #ffb347;
            --orange: #ff5500;
            background: #140b04;
            background-image: linear-gradient(45deg, rgba(255,109,0,0.08) 0%, transparent 50%), linear-gradient(135deg, transparent 50%, rgba(255,133,0,0.08) 100%);
            background-attachment: fixed;
            animation: adminBgShift 12s ease-in-out infinite alternate;
        }
        @keyframes adminBgShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
        body.admin-active .admin-panel {
            box-shadow: 0 0 40px rgba(255,215,0,0.4), inset 0 0 20px rgba(255,215,0,0.05);
            animation: panelGlow 2s ease-in-out infinite alternate;
        }
        @keyframes panelGlow {
            0% { box-shadow: 0 0 40px rgba(255,215,0,0.3), inset 0 0 20px rgba(255,215,0,0.05); }
            100% { box-shadow: 0 0 70px rgba(255,215,0,0.6), inset 0 0 30px rgba(255,215,0,0.1); }
        }
        /* Admin rozeti için özel ışıltı */
        .admin-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px #ffaa00, 0 0 30px rgba(255,215,0,0.5);
            border: 1px solid #ffd700;
            animation: badgePulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes badgePulse {
            0% { box-shadow: 0 0 10px #ffaa00, 0 0 25px rgba(255,215,0,0.4); }
            100% { box-shadow: 0 0 25px #ffd700, 0 0 45px rgba(255,215,0,0.7); }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        .navbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); cursor: pointer; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links button {
            background: var(--soft);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.15s;
        }
        .nav-links button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-primary { background: var(--accent) !important; color: #000 !important; }
        .online-counter {
            background: var(--soft);
            border: 1px solid var(--border);
            color: var(--green);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
        .theme-dot {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; display: inline-block; margin: 0 2px;
        }
        .theme-dot:hover { border-color: #fff; }
        .theme-dot.pink { background: #ff7eb3; }
        .theme-dot.hacker { background: #00ff41; }
        .theme-dot.default { background: #e94560; }
        .theme-dot.admin-gold { background: #ffd700; }
        .theme-dot.admin-purple { background: #c77dff; }
        .theme-dot.admin-orange { background: #ff6d00; }
        .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
        .section-title { font-size: 1.4rem; font-weight: 700; margin: 16px 0 10px; }
        .search-bar {
            width: 100%; max-width: 400px; padding: 10px 16px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--soft); color: var(--text);
            font-size: 0.9rem; outline: none; margin-bottom: 10px;
        }
        .search-bar:focus { border-color: var(--accent); }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }
        .game-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: 0.15s;
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .img-wrap {
            height: 110px; background: var(--soft); display: flex;
            align-items: center; justify-content: center; font-size: 2.5rem;
            border-bottom: 1px solid var(--border);
        }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; }
        .info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
        .category-tag {
            display: inline-block; background: var(--soft); color: var(--accent);
            padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600;
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 200; display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; max-width: 480px; width: 92%; max-height: 82vh; overflow-y: auto;
        }
        .close-btn { float: right; background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; opacity: 0.7; }
        .close-btn:hover { opacity: 1; }
        .download-btn {
            background: var(--accent); color: #000; padding: 10px 20px; border-radius: 6px;
            text-decoration: none; font-weight: 700; display: inline-block; margin-top: 8px;
            border: none; cursor: pointer; font-size: 0.9rem;
        }
        .feature-box {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; margin: 14px 0;
        }
        .feature-box h3 { margin-bottom: 8px; font-size: 1.1rem; }
        .feature-box select, .feature-box input {
            width: 100%; padding: 8px; margin: 4px 0;
            background: var(--soft); border: 1px solid var(--border);
            color: var(--text); border-radius: 4px; font-size: 0.85rem;
        }
        .comment {
            background: var(--soft); padding: 8px 12px; border-radius: 6px;
            margin: 6px 0; font-size: 0.85rem;
        }
        .admin-panel {
            background: var(--card); border: 2px solid var(--orange);
            border-radius: var(--radius); padding: 20px; margin-top: 14px;
        }
        .admin-panel h3 { color: var(--orange); font-size: 1.3rem; margin-bottom: 12px; }
        .admin-menu {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .admin-menu button {
            padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
            font-weight: 700; font-size: 0.85rem; background: var(--soft);
            color: var(--text); border: 1px solid var(--border);
        }
        .admin-menu button:hover { background: var(--accent); color: #000; }
        .admin-menu .active { background: var(--orange) !important; color: #000 !important; border-color: var(--orange) !important; }
        .btn-save {
            background: var(--green); color: #000; padding: 8px 18px; border-radius: 6px;
            border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem;
        }
        .btn-delete { background: #e94560; color: #fff; padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-edit { background: var(--orange); color: #000; padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%; padding: 8px; margin: 4px 0 8px;
            background: var(--soft); border: 1px solid var(--border);
            color: var(--text); border-radius: 4px; font-size: 0.85rem;
        }
        .admin-game-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid var(--border); gap: 6px;
            flex-wrap: wrap; font-size: 0.85rem;
        }
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--green);
            color: #000; padding: 10px 20px; border-radius: 6px; font-weight: 700;
            z-index: 999; font-size: 0.85rem;
        }
        .hidden { display: none !important; }
        .section-btn {
            background: var(--soft); color: var(--text); border: 1px solid var(--border);
            padding: 7px 14px; border-radius: 6px; cursor: pointer; font-weight: 600;
            font-size: 0.8rem; transition: 0.15s;
        }
        .section-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        @media (max-width: 600px) {
            .game-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .nav-links button { padding: 5px 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="location.reload()">🎮 GameHub</div>
    <div class="nav-links">
        <span style="font-size:0.7rem;">Tema:</span>
        <div class="theme-dot pink" onclick="setTheme('pink')" title="Pembe"></div>
        <div class="theme-dot hacker" onclick="setTheme('hacker')" title="Hacker"></div>
        <div class="theme-dot default" onclick="setTheme('default')" title="Normal"></div>
        <span id="adminThemeLabel" class="hidden" style="font-size:0.7rem;margin-left:6px;">Admin Tema:</span>
        <div id="adminThemeDots" class="hidden" style="display:inline-flex;gap:2px;">
            <div class="theme-dot admin-gold" onclick="setTheme('admin-gold')" title="Altın"></div>
            <div class="theme-dot admin-purple" onclick="setTheme('admin-purple')" title="Mor"></div>
            <div class="theme-dot admin-orange" onclick="setTheme('admin-orange')" title="Turuncu"></div>
        </div>
        <div class="online-counter"><span class="dot"></span> <span id="onlineText">1 çevrimiçi</span></div>
        <button onclick="openModal('loginModal')">🔑 Giriş</button>
        <button onclick="openModal('registerModal')">✨ Kayıt</button>
        <button class="btn-primary" onclick="anonymousLogin()">👻 Anonim</button>
        <button id="adminPanelBtn" class="hidden" onclick="openAdminPanel()">🛡️ Admin Paneli</button>
        <span id="userBadge" class="hidden" style="padding:6px 12px;border-radius:6px;font-size:0.8rem;"></span>
        <button id="btnLogout" class="hidden" onclick="logout()">🚪 Çık</button>
    </div>
</nav>

<div class="container" id="mainContent">
    <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Oyun ara...">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
        <button class="section-btn active" onclick="showSection('games')">🎮 Oyunlar</button>
        <button class="section-btn" onclick="showSection('compare')">⚖️ Karşılaştır</button>
        <button class="section-btn" onclick="showSection('pctest')">🖥️ PC Test</button>
        <button class="section-btn" onclick="showSection('comments')">💬 Yorumlar</button>
    </div>
    <div id="gamesSection"><div class="section-title">🔥 Popüler Oyunlar</div><div class="game-grid" id="gameGrid"></div></div>
    <div id="compareSection" class="feature-box hidden">
        <h3>⚖️ Oyun Karşılaştır</h3>
        <select id="compareGame1"><option value="">Oyun 1 seç</option></select>
        <select id="compareGame2"><option value="">Oyun 2 seç</option></select>
        <button onclick="compareGames()" style="background:var(--accent);color:#000;padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;margin-top:6px;">Karşılaştır</button>
        <div id="compareResult" style="margin-top:10px;font-size:0.85rem;"></div>
    </div>
    <div id="pctestSection" class="feature-box hidden">
        <h3>🖥️ Sistem Gereksinim Testi</h3>
        <p style="font-size:0.8rem;opacity:0.7;">Bilgisayar özelliklerini gir, oyunun çalışıp çalışmayacağını gör.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <input type="text" id="cpuInput" placeholder="İşlemci (i5-12400F)">
            <input type="text" id="ramInput" placeholder="RAM (GB)">
            <input type="text" id="gpuInput" placeholder="Ekran kartı (RTX 3060)">
            <input type="text" id="osInput" placeholder="İşletim sistemi">
        </div>
        <select id="testGameSelect" style="margin-top:6px;"><option value="">Test edilecek oyunu seç</option></select>
        <button onclick="runPcTest()" style="background:var(--green);color:#000;padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;margin-top:6px;">Test Et</button>
        <div id="pcTestResult" style="margin-top:10px;font-size:0.85rem;"></div>
    </div>
    <div id="commentsSection" class="feature-box hidden">
        <h3>💬 Genel Yorumlar</h3>
        <div id="globalComments" style="font-size:0.85rem;"></div>
        <div style="display:flex;gap:6px;margin-top:8px;">
            <input type="text" id="globalCommentInput" placeholder="Yorumunuzu yazın..." style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--soft);color:var(--text);font-size:0.85rem;">
            <button onclick="addGlobalComment()" style="background:var(--accent);color:#000;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:0.85rem;">Gönder</button>
        </div>
    </div>
</div>

<div class="container hidden" id="adminContainer">
    <div class="admin-panel">
        <h3>🛡️ Admin Paneli</h3>
        <div class="admin-menu">
            <button id="menuAdd" class="active" onclick="showAdminSection('add')">➕ Oyun Ekle</button>
            <button id="menuList" onclick="showAdminSection('list')">📋 Liste</button>
            <button id="menuEdit" onclick="showAdminSection('edit')">✏️ Düzenle</button>
            <button onclick="closeAdminPanel()" style="background:#555;color:#fff;">❌ Paneli Kapat</button>
        </div>
        <div id="sectionAdd" class="admin-form">
            <h4>Yeni Oyun Ekle</h4>
            <input type="text" id="addTitle" placeholder="Oyun Adı *">
            <textarea id="addDesc" placeholder="Açıklama *" rows="2"></textarea>
            <input type="text" id="addImage" placeholder="Resim URL (opsiyonel)">
            <input type="text" id="addDownload" placeholder="İndirme Linki *">
            <input type="text" id="addCategory" placeholder="Kategori *">
            <input type="text" id="addSize" placeholder="Boyut (örn: 25 GB)">
            <input type="text" id="addCpu" placeholder="Minimum İşlemci">
            <input type="text" id="addRam" placeholder="Minimum RAM (GB)">
            <input type="text" id="addGpu" placeholder="Minimum Ekran Kartı">
            <button class="btn-save" onclick="addGame()">💾 Ekle</button>
        </div>
        <div id="sectionList" class="hidden"><h4>Tüm Oyunlar</h4><div id="adminGameList"></div></div>
        <div id="sectionEdit" class="admin-form hidden">
            <h4>Oyun Düzenle</h4>
            <select id="editSelect" onchange="loadGameForEdit()"><option value="">Düzenlenecek oyunu seç</option></select>
            <input type="hidden" id="editGameId">
            <input type="text" id="editTitle" placeholder="Oyun Adı">
            <textarea id="editDesc" placeholder="Açıklama" rows="2"></textarea>
            <input type="text" id="editImage" placeholder="Resim URL">
            <input type="text" id="editDownload" placeholder="İndirme Linki">
            <input type="text" id="editCategory" placeholder="Kategori">
            <input type="text" id="editSize" placeholder="Boyut">
            <input type="text" id="editCpu" placeholder="Minimum İşlemci">
            <input type="text" id="editRam" placeholder="Minimum RAM">
            <input type="text" id="editGpu" placeholder="Minimum Ekran Kartı">
            <button class="btn-save" onclick="updateGame()">💾 Güncelle</button>
        </div>
    </div>
</div>

<div class="modal-overlay hidden" id="gameDetailModal"><div class="modal" id="gameDetailContent"></div></div>
<div class="modal-overlay hidden" id="loginModal">
    <div class="modal"><button class="close-btn" onclick="closeModal('loginModal')">✕</button><h3>🔑 Giriş</h3>
        <input id="loginUsername" placeholder="Kullanıcı adı" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <input type="password" id="loginPassword" placeholder="Şifre" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <button class="download-btn" onclick="login()" style="width:100%;">Giriş Yap</button></div></div>
<div class="modal-overlay hidden" id="registerModal">
    <div class="modal"><button class="close-btn" onclick="closeModal('registerModal')">✕</button><h3>✨ Kayıt</h3>
        <input id="regUsername" placeholder="Kullanıcı adı" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <input type="email" id="regEmail" placeholder="E-posta (opsiyonel)" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <input type="password" id="regPassword" placeholder="Şifre" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <button class="download-btn" onclick="register()" style="width:100%;">Kayıt Ol</button></div></div>
<div class="modal-overlay hidden" id="adminLoginModal">
    <div class="modal"><button class="close-btn" onclick="closeModal('adminLoginModal')">✕</button><h3>🛡️ Admin Girişi</h3>
        <input type="password" id="adminKey" placeholder="Admin şifresi" style="width:100%;padding:8px;margin:5px 0;background:var(--soft);border:1px solid var(--border);color:var(--text);border-radius:4px;">
        <button class="download-btn" onclick="adminLogin()" style="width:100%;">Giriş</button></div></div>
<div class="toast hidden" id="toast"></div>
<div style="position:fixed;bottom:14px;right:14px;width:30px;height:30px;background:var(--card);border:1px solid var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:300;color:var(--accent);font-size:0.8rem;font-weight:bold;" onclick="openModal('adminLoginModal')" title="Admin">⚙</div>

        { id: '3', title: 'Speed Racers Ultimate', desc: 'Gerçekçi yarış simülasyonu.', image: 'https://picsum.photos/seed/racing/400/250', download: '#', category: 'Yarış', size: '32 GB', minCpu: 'i5-11400H', minRam: '8', minGpu: 'GTX 1650' },
        { id: '4', title: 'Shadow Tactics', desc: 'Gizlilik stratejisi.', image: 'https://picsum.photos/seed/stealth/400/250', download: '#', category: 'Strateji', size: '18 GB', minCpu: 'i3-8100', minRam: '4', minGpu: 'Intel UHD 630' },
        { id: '5', title: 'Zombie Frontier X', desc: 'Hayatta kalma.', image: 'https://picsum.photos/seed/zombie/400/250', download: '#', category: 'Hayatta Kalma', size: '55 GB', minCpu: 'i7-8700', minRam: '16', minGpu: 'RTX 2070' },
    ];

    function getGames() { const stored = safeGet('gh_games', null); if (stored && Array.isArray(stored) && stored.length > 0) return stored; safeSet('gh_games', defaultGames); return [...defaultGames]; }
    function saveGames(g) { if (Array.isArray(g)) safeSet('gh_games', g); }
    function getUsers() { return safeGet('gh_users', []); }
    function saveUsers(u) { safeSet('gh_users', u); }
    function getComments() { return safeGet('gh_comments', []); }
    function saveComments(c) { safeSet('gh_comments', c); }
    function getCurrentUser() { return safeGet('gh_user', null); }
    function setCurrentUser(u) { safeSet('gh_user', u); }
    function isAdmin() { return localStorage.getItem('gh_admin') === 'true'; }
    function setAdmin(v) { localStorage.setItem('gh_admin', v ? 'true' : 'false'); }

    let adminPanelVisible = false;

    window.setTheme = function(t) {
        if (!isAdmin() && (t === 'admin-gold' || t === 'admin-purple' || t === 'admin-orange')) {
            t = 'default';
        }
        document.body.className = '';
        if (t === 'pink') document.body.classList.add('theme-pink');
        else if (t === 'hacker') document.body.classList.add('theme-hacker');
        else if (t === 'admin-gold') document.body.classList.add('theme-admin-gold');
        else if (t === 'admin-purple') document.body.classList.add('theme-admin-purple');
        else if (t === 'admin-orange') document.body.classList.add('theme-admin-orange');
        safeSet('gh_theme', t);
        applyAdminPanelGlow();
    };

    function applyAdminPanelGlow() {
        if (isAdmin()) document.body.classList.add('admin-active');
        else document.body.classList.remove('admin-active');
    }

    let savedTheme = safeGet('gh_theme', 'default');
    if (!isAdmin() && (savedTheme === 'admin-gold' || savedTheme === 'admin-purple' || savedTheme === 'admin-orange')) {
        savedTheme = 'default';
        safeSet('gh_theme', savedTheme);
    }
    setTheme(savedTheme);

    setInterval(() => {
        let sessions = safeGet('gh_sessions', {});
        const now = Date.now();
        for (let key in sessions) { if (now - sessions[key] > 15000) delete sessions[key]; }
        sessions['self'] = now;
        safeSet('gh_sessions', sessions);
        document.getElementById('onlineText').textContent = Object.keys(sessions).length + ' çevrimiçi';
    }, 5000);

    window.showToast = function(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 2000); };
    window.openModal = function(id) { document.getElementById(id).classList.remove('hidden'); };
    window.closeModal = function(id) { document.getElementById(id).classList.add('hidden'); };
    document.addEventListener('click', function(e) { if (e.target.classList.contains('modal-overlay')) e.target.classList.add('hidden'); });

    function renderGames(filter = '') {
        const games = getGames();
        const f = filter.toLowerCase();
        const filtered = games.filter(g => g.title.toLowerCase().includes(f) || g.category.toLowerCase().includes(f));
        const grid = document.getElementById('gameGrid');
        if (filtered.length === 0) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;">😔 Oyun bulunamadı</p>'; }
        else { grid.innerHTML = filtered.map(g => `<div class="game-card" onclick="openGameDetail('${g.id}')"><div class="img-wrap">${g.image ? `<img src="${g.image}" onerror="this.innerHTML='🎮'">` : '🎮'}</div><div class="info"><h3>${g.title}</h3><span class="category-tag">${g.category}</span></div></div>`).join(''); }
        updateSelects();
    }
    document.getElementById('searchInput').addEventListener('input', function() { renderGames(this.value); });

    function updateSelects() {
        const games = getGames();
        const opts = games.map(g => `<option value="${g.id}">${g.title}</option>`).join('');
        document.getElementById('compareGame1').innerHTML = '<option value="">Oyun 1 seç</option>' + opts;
        document.getElementById('compareGame2').innerHTML = '<option value="">Oyun 2 seç</option>' + opts;
        document.getElementById('testGameSelect').innerHTML = '<option value="">Oyun seç</option>' + opts;
        document.getElementById('editSelect').innerHTML = '<option value="">Oyun seç</option>' + opts;
        renderComments();
    }

    window.openGameDetail = function(id) {
        const game = getGames().find(g => g.id === id);
        if (!game) return;
        document.getElementById('gameDetailContent').innerHTML = `<button class="close-btn" onclick="closeModal('gameDetailModal')">✕</button><div style="height:120px;background:var(--soft);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;">${game.image ? `<img src="${game.image}" style="width:100%;height:100%;object-fit:cover;">` : '🎮'}</div><h3>${game.title}</h3><p style="font-size:0.8rem;opacity:0.8;">📦 ${game.size} | 🏷️ ${game.category}</p><p style="margin:6px 0;">${game.desc}</p><p style="font-size:0.75rem;opacity:0.7;">🖥️ Min: ${game.minCpu||'?'} | ${game.minRam||'?'} GB RAM | ${game.minGpu||'?'}</p><a href="${game.download}" class="download-btn" target="_blank">⬇️ İndir</a>`;
        openModal('gameDetailModal');
    };

    window.compareGames = function() {
        const id1 = document.getElementById('compareGame1').value;
        const id2 = document.getElementById('compareGame2').value;
        if (!id1 || !id2) return showToast('Lütfen iki oyun seçin!');
        const a = getGames().find(g => g.id === id1);
        const b = getGames().find(g => g.id === id2);
        if (!a || !b) return;
        document.getElementById('compareResult').innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:0.85rem;"><tr style="border-bottom:1px solid var(--border);"><th>Özellik</th><th>${a.title}</th><th>${b.title}</th></tr><tr><td>Kategori</td><td>${a.category}</td><td>${b.category}</td></tr><tr><td>Boyut</td><td>${a.size}</td><td>${b.size}</td></tr><tr><td>Min İşlemci</td><td>${a.minCpu||'?'}</td><td>${b.minCpu||'?'}</td></tr><tr><td>Min RAM</td><td>${a.minRam||'?'} GB</td><td>${b.minRam||'?'} GB</td></tr><tr><td>Min GPU</td><td>${a.minGpu||'?'}</td><td>${b.minGpu||'?'}</td></tr></table>`;
    };

    window.runPcTest = function() {
        const gameId = document.getElementById('testGameSelect').value;
        if (!gameId) return showToast('Lütfen bir oyun seçin!');
        const game = getGames().find(g => g.id === gameId);
        if (!game) return;
        const cpu = document.getElementById('cpuInput').value.trim().toLowerCase();
        const ram = parseInt(document.getElementById('ramInput').value.trim());
        const gpu = document.getElementById('gpuInput').value.trim().toLowerCase();
        const cpuOk = cpu.includes(game.minCpu?.toLowerCase() || '') || !game.minCpu;
        const ramOk = ram >= parseInt(game.minRam || 0);
        const gpuOk = gpu.includes(game.minGpu?.toLowerCase() || '') || !game.minGpu;
        const ok = cpuOk && ramOk && gpuOk;
        document.getElementById('pcTestResult').innerHTML = `<p><b>${game.title}</b> için sonuç:</p><p style="font-size:1.1rem;font-weight:700;color:${ok?'var(--green)':'#e94560'};">${ok ? '✅ AÇILIR' : '❌ AÇILMAZ'}</p><p style="font-size:0.8rem;">CPU: ${cpuOk?'✅':'❌'} | RAM: ${ramOk?'✅':'❌'} | GPU: ${gpuOk?'✅':'❌'}</p>`;
    };

    function renderComments() {
        const comments = getComments();
        const container = document.getElementById('globalComments');
        if (comments.length === 0) { container.innerHTML = '<p style="opacity:0.6;">Henüz yorum yok.</p>'; }
        else { container.innerHTML = comments.slice(-10).reverse().map(c => `<div class="comment"><b style="color:var(--accent);">${c.author}</b> <small style="opacity:0.6;">${c.date}</small><p>${c.text}</p></div>`).join(''); }
    }

    window.addGlobalComment = function() {
        const user = getCurrentUser();
        if (!user) return showToast('Yorum yapmak için giriş yapın!');
        const text = document.getElementById('globalCommentInput').value.trim();
        if (!text) return showToast('Yorum boş olamaz!');
        const comments = getComments();
        comments.push({ author: user.username, text: text, date: new Date().toLocaleString('tr-TR') });
        saveComments(comments);
        document.getElementById('globalCommentInput').value = '';
        renderComments();
        showToast('✅ Yorum eklendi!');
    };

    window.showSection = function(section) {
        document.getElementById('gamesSection').classList.add('hidden');
        document.getElementById('compareSection').classList.add('hidden');
        document.getElementById('pctestSection').classList.add('hidden');
        document.getElementById('commentsSection').classList.add('hidden');
        if (section === 'games') document.getElementById('gamesSection').classList.remove('hidden');
        else if (section === 'compare') document.getElementById('compareSection').classList.remove('hidden');
        else if (section === 'pctest') document.getElementById('pctestSection').classList.remove('hidden');
        else if (section === 'comments') document.getElementById('commentsSection').classList.remove('hidden');
        document.querySelectorAll('.section-btn').forEach(btn => btn.classList.remove('active'));
        const buttons = document.querySelectorAll('.section-btn');
        buttons.forEach(btn => { if (btn.getAttribute('onclick').includes(`'${section}'`)) btn.classList.add('active'); });
    };

    window.login = function() {
        const u = document.getElementById('loginUsername').value.trim();
        const p = document.getElementById('loginPassword').value.trim();
        if (!u || !p) return showToast('Boş bırakmayın!');
        const user = getUsers().find(x => x.username === u && x.password === p);
        if (!user) return showToast('Hatalı!');
        setCurrentUser({ username: user.username });
        closeModal('loginModal');
        updateUI();
    };
    window.register = function() {
        const u = document.getElementById('regUsername').value.trim();
        const p = document.getElementById('regPassword').value.trim();
        if (!u || !p) return showToast('Kullanıcı adı ve şifre zorunlu!');
        if (getUsers().find(x => x.username === u)) return showToast('Alınmış!');
        getUsers().push({ username: u, email: document.getElementById('regEmail').value.trim(), password: p });
        saveUsers(getUsers());
        setCurrentUser({ username: u });
        closeModal('registerModal');
        updateUI();
    };
    window.anonymousLogin = function() { setCurrentUser({ username: 'Anon_'+Math.random().toString(36).substr(2,5) }); updateUI(); };
    window.logout = function() { setCurrentUser(null); setAdmin(false); adminPanelVisible = false; updateUI(); };

    window.openAdminPanel = function() {
        adminPanelVisible = true;
        updateUI();
    };

    window.adminLogin = function() {
        if (document.getElementById('adminKey').value.trim() === ADMIN_PASSWORD) {
            setAdmin(true);
            if (!getCurrentUser()) setCurrentUser({ username: 'Admin' });
            closeModal('adminLoginModal');
            adminPanelVisible = true;
            updateUI();
            showToast('🛡️ Admin paneline hoş geldin!');
        } else showToast('❌ Hatalı şifre!');
    };
    window.closeAdminPanel = function() { adminPanelVisible = false; updateUI(); };

    window.showAdminSection = function(s) {
        document.getElementById('sectionAdd').classList.add('hidden');
        document.getElementById('sectionList').classList.add('hidden');
        document.getElementById('sectionEdit').classList.add('hidden');
        document.getElementById('menuAdd').classList.remove('active');
        document.getElementById('menuList').classList.remove('active');
        document.getElementById('menuEdit').classList.remove('active');
        if (s === 'add') { document.getElementById('sectionAdd').classList.remove('hidden'); document.getElementById('menuAdd').classList.add('active'); }
        else if (s === 'list') { document.getElementById('sectionList').classList.remove('hidden'); document.getElementById('menuList').classList.add('active'); renderAdminList(); }
        else { document.getElementById('sectionEdit').classList.remove('hidden'); document.getElementById('menuEdit').classList.add('active'); updateSelects(); }
    };

    function renderAdminList() {
        document.getElementById('adminGameList').innerHTML = getGames().map(g => `<div class="admin-game-list-item"><span><b>${g.title}</b> (${g.category}) - ${g.size}</span><div><button class="btn-edit" onclick="editDirect('${g.id}')">✏️</button> <button class="btn-delete" onclick="delGame('${g.id}')">🗑️</button></div></div>`).join('');
    }
    window.editDirect = function(id) { showAdminSection('edit'); document.getElementById('editSelect').value = id; loadGameForEdit(); };
    window.loadGameForEdit = function() {
        const id = document.getElementById('editSelect').value;
        const game = getGames().find(g => g.id === id);
        if (!game) return;
        ['editGameId','editTitle','editDesc','editImage','editDownload','editCategory','editSize','editCpu','editRam','editGpu'].forEach((f,i) => document.getElementById(f).value = [game.id, game.title, game.desc, game.image||'', game.download, game.category, game.size, game.minCpu||'', game.minRam||'', game.minGpu||''][i]);
    };
    window.addGame = function() {
        const vals = ['addTitle','addDesc','addDownload','addCategory'].map(id => document.getElementById(id).value.trim());
        if (vals.some(v => !v)) return showToast('Zorunlu alanları doldurun!');
        const newGame = { id: Date.now().toString(), title: vals[0], desc: vals[1], image: document.getElementById('addImage').value.trim(), download: vals[2], category: vals[3], size: document.getElementById('addSize').value.trim()||'?', minCpu: document.getElementById('addCpu').value.trim(), minRam: document.getElementById('addRam').value.trim(), minGpu: document.getElementById('addGpu').value.trim() };
        const games = getGames(); games.push(newGame); saveGames(games);
        ['addTitle','addDesc','addImage','addDownload','addCategory','addSize','addCpu','addRam','addGpu'].forEach(id => document.getElementById(id).value = '');
        showToast('✅ Oyun eklendi!'); renderGames();
    };
    window.updateGame = function() {
        const id = document.getElementById('editGameId').value;
        if (!id) return showToast('Önce bir oyun seçin!');
        const games = getGames();
        const idx = games.findIndex(g => g.id === id);
        if (idx === -1) return;
        games[idx] = { ...games[idx], title: document.getElementById('editTitle').value.trim(), desc: document.getElementById('editDesc').value.trim(), image: document.getElementById('editImage').value.trim(), download: document.getElementById('editDownload').value.trim(), category: document.getElementById('editCategory').value.trim(), size: document.getElementById('editSize').value.trim(), minCpu: document.getElementById('editCpu').value.trim(), minRam: document.getElementById('editRam').value.trim(), minGpu: document.getElementById('editGpu').value.trim() };
        saveGames(games); showToast('✅ Oyun güncellendi!'); renderGames(); showAdminSection('list');
    };
    window.delGame = function(id) {
        if (!confirm('Silmek istediğinize emin misiniz?')) return;
        saveGames(getGames().filter(g => g.id !== id)); showToast('🗑️ Oyun silindi!'); renderGames(); renderAdminList();
    };

    function updateUI() {
        const user = getCurrentUser();
        const admin = isAdmin();
        const badge = document.getElementById('userBadge');
        if (user) {
            badge.classList.remove('hidden');
            if (admin) {
                // Admin ise özel ışıltılı rozet
                badge.className = 'admin-badge';
                badge.textContent = '👑 Admin';
            } else {
                badge.className = '';
                badge.style.background = 'var(--soft)';
                badge.style.color = 'var(--text)';
                badge.style.border = '1px solid var(--border)';
                badge.style.boxShadow = 'none';
                badge.style.animation = 'none';
                badge.textContent = '👤 ' + user.username;
            }
        } else {
            badge.classList.add('hidden');
        }
        document.getElementById('btnLogout').classList.toggle('hidden', !user);
        document.querySelectorAll('.nav-links button:not(#btnLogout):not(#adminPanelBtn)').forEach(b => b.classList.toggle('hidden', !!user));
        document.querySelector('.online-counter').classList.remove('hidden');

        document.getElementById('adminPanelBtn').classList.toggle('hidden', !admin);
        if (admin) {
            document.getElementById('adminPanelBtn').textContent = '🛡️ Admin Paneli';
        }

        document.getElementById('adminThemeLabel').classList.toggle('hidden', !admin);
        document.getElementById('adminThemeDots').classList.toggle('hidden', !admin);

        document.getElementById('mainContent').classList.toggle('hidden', admin && adminPanelVisible);
        document.getElementById('adminContainer').classList.toggle('hidden', !(admin && adminPanelVisible));

        applyAdminPanelGlow();

        if (!admin) {
            const currentTheme = safeGet('gh_theme', 'default');
            if (currentTheme === 'admin-gold' || currentTheme === 'admin-purple' || currentTheme === 'admin-orange') {
                setTheme('default');
            }
        }

        if (admin && adminPanelVisible) showAdminSection('add');
        renderGames(document.getElementById('searchInput').value);
    }

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.key === 'A') {
            e.preventDefault();
            if (isAdmin()) {
                adminPanelVisible = !adminPanelVisible; updateUI();
            } else openModal('adminLoginModal');
        }
    });

    updateUI();
</script>
</body>
</html>
